name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: uv run pytest
      - name: Wheel metadata smoke test
        run: ./scripts/clean-venv-smoke.sh
      - name: Clean-venv wheel end-to-end test
        run: ./scripts/e2e-wheel-test.sh
